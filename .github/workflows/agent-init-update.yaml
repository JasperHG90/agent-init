# Sample workflow: run agent-init skill update on a schedule and open a PR
# with anything that's drifted upstream. Drop into your repo at
# `.github/workflows/agent-init-update.yaml` and adjust the schedule + repo
# list as needed.

name: agent-init skill update

on:
  schedule:
    - cron: "17 7 * * 1"  # Mondays at 07:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install agent-init
        run: uv tool install agent-init

      # Each `repo add` is idempotent; list yours here.
      - name: Register skill repos
        run: |
          agent-init repo add anthropic https://github.com/anthropics/skills || true

      - name: Refresh + bulk update
        run: |
          for alias in $(agent-init repo list | awk '{print $1}'); do
            agent-init repo refresh "$alias"
          done
          agent-init skill update-many --all --outdated || true

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump skills via agent-init"
          title: "Bump installed skills"
          body: |
            Automated agent-init skill update. See `.agent-init/manifest.json` for the new versions.
          branch: agent-init/skill-updates
          delete-branch: true
